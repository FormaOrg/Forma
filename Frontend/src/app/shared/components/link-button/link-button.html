<button
    [style.backgroundColor]="bgColor"
    [style.color]="txtColor"
    [style.width]="width"
    [style.height]="height"
    [style.padding]="padding"
    [style.fontSize]="fontSize"
    [style.fontWeight]="fontWeight"
    [style.border]="border"
    [style.--txt-slide]="txtSlide"
    [style.--arrow-slide]="arrowSlide"
    [style.--arrow-filter]="arrowFilter"
    >
    <span class="text">{{content}}</span>
    <img
        class="arrow"
        [src]="'assets/shared/link-button/arrow-right-' + theme + '.svg'"
        alt=""
    />
</button>
