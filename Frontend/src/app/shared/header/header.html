<header class="site-header">
  <div class="header-inner">
    <!-- Logo -->
    <div class="header-logo">
      <a href="/" aria-label="Forma home" class="logo-link">
        <img src="icons/FormaLogo.svg" alt="Forma Logo" />
      </a>
    </div>

    <!-- Primary Navigation -->
    <nav aria-label="Primary navigation" class="primary-nav">
      <a href="#" class="nav-link">
        <span>Product</span>
        <svg
          class="nav-chevron"
          viewBox="0 0 20 20"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            d="M5 7.5L10 12.5L15 7.5"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
      <a href="#" class="nav-link">
        <span>Solutions</span>
        <svg
          class="nav-chevron"
          viewBox="0 0 20 20"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            d="M5 7.5L10 12.5L15 7.5"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
      <a href="#" class="nav-link"><span>Pricing</span></a>
      <a href="#" class="nav-link"><span>Blog</span></a>
    </nav>

    <!-- Right-side actions -->
    <div class="header-actions">
      <!-- Globe / Language -->
      <a href="#" aria-label="Language or region" class="icon-link lang-link">
        <svg
          class="icon-globe"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.7" />
          <path d="M3.5 12H20.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
          <path
            d="M12 3.5C14.5 5.9 15.9 8.88 15.9 12C15.9 15.12 14.5 18.1 12 20.5C9.5 18.1 8.1 15.12 8.1 12C8.1 8.88 9.5 5.9 12 3.5Z"
            stroke="currentColor"
            stroke-width="1.7"
            stroke-linejoin="round"
          />
        </svg>
      </a>

      <span class="divider" aria-hidden="true"></span>

      <a href="#" class="login-link">Login</a>

      <a href="#" class="btn-try">Try for free</a>

      <!-- Mobile menu toggle -->
      <button type="button" aria-label="Open menu" class="menu-toggle">
        <svg
          class="icon-menu"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path d="M4 7H20" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" />
          <path d="M4 12H20" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" />
          <path d="M4 17H20" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" />
        </svg>
      </button>
    </div>
  </div>
</header>
