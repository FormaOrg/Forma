<aside class="settings-sidebar" [class.settings-sidebar--collapsed]="collapsed" [class.settings-sidebar--no-transition]="!isInitialized">
  <div class="settings-sidebar__brand">
    <div class="settings-sidebar__mark" aria-hidden="true">
      <img src="assets/Logo/FormaLogoOnly.svg" alt="" width="28" height="28" />
    </div>
    <span class="settings-sidebar__wordmark">Forma</span>
  </div>

  <nav class="settings-sidebar__body" aria-label="Settings">
    @for (section of sections; track trackSectionId($index, section)) {
      @if (!$first) {
        <div class="settings-sidebar__separator" aria-hidden="true"></div>
      }

      @if (section.label) {
        <div class="settings-sidebar__section-label">
          <span class="settings-sidebar__section-label-text">{{ section.label }}</span>
        </div>
      }

      <ul class="settings-sidebar__list" role="list">
        @for (item of section.items; track trackItemRoute($index, item.route)) {
          <li class="settings-sidebar__item">
            <a
              class="settings-sidebar__row"
              [routerLink]="item.route"
              routerLinkActive="settings-sidebar__row--active"
              [routerLinkActiveOptions]="{ exact: true }"
              [class.settings-sidebar__row--collapsed]="collapsed"
            >
              <span class="settings-sidebar__icon">
                <app-icon [name]="item.icon" [size]="iconSize" />
              </span>
              <span class="settings-sidebar__label">{{ item.label }}</span>
            </a>
          </li>
        }
      </ul>
    }
  </nav>
</aside>
