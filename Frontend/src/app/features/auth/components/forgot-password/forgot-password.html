<div class="logo-section">
  <div class="logo-icon">
    <img src="assets/Logo/FormaLogo.svg" alt="Forma logo">
  </div>
</div>

<!-- SUCCESS STATE -->
<div class="success-state" *ngIf="success">
  <div class="icon-container">
    <svg class="state-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
      <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
      <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
    </svg>
  </div>

  <div class="header success-header">
    <h2 class="title">Check Your Inbox</h2>
    <p class="subtitle">{{ success }}</p>
    <p class="redirect-info">Redirecting to login in a few seconds...</p>
  </div>

  <a routerLink="/login" class="btn btn-primary">Back to Login</a>
</div>

<!-- FORM STATE -->
<div *ngIf="!success">
  <div class="header">
    <h2 class="title">Forgot Password?</h2>
    <p class="subtitle">
      No worries! Enter your email and we'll send you a reset link.
    </p>
  </div>

  <form #f="ngForm" (ngSubmit)="onSubmit(f)" novalidate>
    <div class="input-form">
      <label for="email">Email Address</label>
      <div class="input-box"
           [class.invalid]="(emailRef.invalid && (emailRef.touched || f.submitted)) || !!error">
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          #emailRef="ngModel"
          placeholder="Enter your registered email"
          required
          email
          [disabled]="isLoading">
      </div>

      <div class="error" [class.visible]="emailRef.invalid && (emailRef.touched || f.submitted)">
        <span *ngIf="emailRef.errors?.['required']">Email is required</span>
        <span *ngIf="emailRef.errors?.['email']">Please enter a valid email</span>
        <span *ngIf="!(emailRef.invalid && (emailRef.touched || f.submitted))">&nbsp;</span>
      </div>
    </div>

    <div class="alert-slot">
      <div class="error-alert" [class.visible]="!!error">
        {{ error || ' ' }}
      </div>
    </div>

    <button type="submit" [disabled]="f.invalid || isLoading">
      <span *ngIf="!isLoading">Send Reset Link</span>
      <span *ngIf="isLoading" class="loading">
        <span class="spinner"></span>
        Sending...
      </span>
    </button>
  </form>

  <div class="back-link">
    <a routerLink="/login">&larr; Back to Login</a>
  </div>
</div>
