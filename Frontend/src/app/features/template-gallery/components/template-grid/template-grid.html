<div class="grid-section" (click)="sortDropdownOpen.set(false)">

  <!-- Section header -->
  <div class="grid-header">
    <h2 class="grid-header__title">{{ sectionTitle }}</h2>

    <!-- Sort dropdown -->
    <div class="sort-dropdown" [class.is-open]="sortDropdownOpen()" (click)="$event.stopPropagation()">
      <button class="sort-dropdown__trigger" (click)="toggleSortDropdown()">
        Sort by:
        <span class="sort-dropdown__value">{{ sortLabels[activeFilters.sortBy] }}</span>
        <svg class="sort-dropdown__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </button>

      @if (sortDropdownOpen()) {
        <div class="sort-dropdown__menu">
          <button class="sort-dropdown__item" [class.is-selected]="activeFilters.sortBy === 'recommended'" (click)="selectSort('recommended')">Recommended</button>
          <button class="sort-dropdown__item" [class.is-selected]="activeFilters.sortBy === 'newest'" (click)="selectSort('newest')">Newest</button>
          <button class="sort-dropdown__item" [class.is-selected]="activeFilters.sortBy === 'popular'" (click)="selectSort('popular')">Most Popular</button>
        </div>
      }
    </div>
  </div>

  <!-- Template grid -->
  @if (pagedTemplates.length > 0) {
    <div class="template-grid">
      @for (template of pagedTemplates; track template.id) {
        <div class="template-card">
          <div class="template-card__preview">
            <div class="template-card__dots">
              <span></span><span></span><span></span>
            </div>
            <img
              class="template-card__img"
              [src]="template.image"
              [alt]="template.name"
              loading="lazy"
            />
            <div class="template-card__overlay">
              <button class="template-card__btn template-card__btn--primary">Use Template</button>
              <button class="template-card__btn template-card__btn--secondary">Preview</button>
            </div>
          </div>

          <div class="template-card__footer">
            <span class="template-card__name">{{ template.name }}</span>
          </div>
        </div>
      }
    </div>

    <!-- Pagination -->
    <app-pagination
      [currentPage]="currentPage"
      [totalPages]="totalPages"
      (pageChange)="onPageChange($event)"
    />

  } @else {
    <div class="grid-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/>
        <path d="M21 21l-4.35-4.35"/>
      </svg>
      <p>No templates found for your search.</p>
      <span>Try different keywords or adjust your filters.</span>
    </div>
  }

</div>
