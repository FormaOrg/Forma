<section class="templates-showcase">
    <div class="templates-showcase_intro">
        <div class="templates-showcase_intro_left">
            <p>{{ 'landing.templates.introLeft' | t }}</p>
        </div>

        <div class="templates-showcase_intro_right">
            <p>
                {{ 'landing.templates.introRight' | t }}
            </p>
            <link-button
                [bgColor]="'#7566ff'"
                [txtColor]="'white'"
                [theme]="'white'"
                [content]="'landing.cta.getStarted' | t"
                [routerLink]="'/login'"
            ></link-button>
        </div>
    </div>

    <div class="telplate-showcase_slider" #slider>
        @for (template of templates; track template.image) {
            <article class="template_card">
                <div class="template_card_image_wrap">
                    <img [src]="template.image" [alt]="template.categoryKey | t" class="template_card_image" loading="lazy" decoding="async">

                    <div class="template_card_overlay"></div>

                    <a href="#" class="template_card_view_btn">{{ 'landing.templates.view' | t }}</a>
                </div>
                
                <div>
                    <a href="#" class="template_card_category_link">
                        <span>{{ template.categoryKey | t }}</span>
                        <span class="template_card_category_arrow">→</span>
                    </a>
                </div>
            </article>
        }
        
    </div>
</section>
