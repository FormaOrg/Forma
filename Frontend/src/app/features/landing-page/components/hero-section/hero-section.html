<section>
    <div class="top">
        <h2 class="title">{{ 'landing.hero.titlePrefix' | t }} <span>{{ 'landing.hero.titleEmphasis' | t }}</span></h2>
        <p class="subtitle">{{ 'landing.hero.subtitle' | t }}</p>
        <link-button
                [bgColor]="'#7566ff'"
                [txtColor]="'white'"
                [theme]="'white'"
                [content]="'landing.cta.getStarted' | t"
                [routerLink]="'/login'"
        ></link-button>
    </div>
    <div class="bottom">
        <img class="img1" src="assets\Landing Page\Hero Section\main.svg" alt="IMG_NOT_FOUND" fetchpriority="high" decoding="async">
        <div class="moving-animation">
            <img class="img2" src="assets\Landing Page\Hero Section\component.svg" alt="IMG_NOT_FOUND" decoding="async">
            <img class="cursor" src="assets\Landing Page\Hero Section\cursor.svg" alt="IMG_NOT_FOUND" decoding="async">
        </div>  
    </div>
</section>
