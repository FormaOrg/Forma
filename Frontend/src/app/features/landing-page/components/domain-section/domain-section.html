<section>
    <h2 class="title">{{ 'landing.domain.title' | t }}</h2>
    <div class="search-bar">
        <input type="text" [placeholder]="'landing.domain.placeholder' | t" size="20">
        <button class="btn">
            {{ 'landing.domain.search' | t }}
            <img src="assets\Landing Page\Domain Section\arrow-right.svg">
        </button>
    </div>
    <p>
        {{ 'landing.domain.note.prefix' | t }}
        <u>{{ 'landing.domain.note.customDomain' | t }}</u>
        {{ 'landing.domain.note.middle' | t }}
        <u>{{ 'landing.domain.note.premiumPlan' | t }}</u>{{ 'landing.domain.note.suffix' | t }}
    </p>
</section>
