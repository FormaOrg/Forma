<section class="storefront-section">

  <!-- Left: text content -->
  <div class="storefront-section__left">
    <h2 class="storefront-section__title">Unmatched storefront design</h2>
    <p class="storefront-section__desc">
      Build high-converting storefronts and product pages customized
      for your brand. Leverage built-in features and exceptional
      no-code creation to turn your vision into reality even faster.
    </p>
    <link-button
      [bgColor]="'#111111'"
      [txtColor]="'#ffffff'"
      [theme]="'white'"
      [content]="'Design Your Store'"
      [width]="'250px'"
    ></link-button>
  </div>

  <!-- Right: editor mockup -->
  <div class="storefront-section__right">
    <div class="editor-mockup">

      <!-- Toolbar -->
      <div class="editor-toolbar">
        <div class="editor-toolbar__left">
          <div class="editor-toolbar__page-selector">
            <span class="editor-toolbar__page-label">Page:</span>
            <span class="editor-toolbar__page-name">Home</span>
            <svg class="editor-toolbar__chevron" viewBox="0 0 10 6" fill="none">
              <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>

          <div class="editor-toolbar__divider"></div>

          <div class="editor-toolbar__devices">
            <button class="editor-toolbar__device editor-toolbar__device--active" aria-label="Desktop">
              <svg viewBox="0 0 20 16" fill="none">
                <rect x="1" y="1" width="18" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/>
                <path d="M7 15h6M10 13v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </button>
            <button class="editor-toolbar__device" aria-label="Mobile">
              <svg viewBox="0 0 12 18" fill="none">
                <rect x="1" y="1" width="10" height="16" rx="2" stroke="currentColor" stroke-width="1.4"/>
                <circle cx="6" cy="14.5" r="0.8" fill="currentColor"/>
              </svg>
            </button>
          </div>

          <div class="editor-toolbar__divider"></div>

          <div class="editor-toolbar__history">
            <button class="editor-toolbar__hist-btn" aria-label="Undo">
              <svg viewBox="0 0 16 16" fill="none">
                <path d="M2 6h7a5 5 0 0 1 0 10H5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 6l3-3M2 6l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="editor-toolbar__hist-btn" aria-label="Redo">
              <svg viewBox="0 0 16 16" fill="none">
                <path d="M14 6H7a5 5 0 0 0 0 10h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M14 6l-3-3M14 6l-3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>

          <div class="editor-toolbar__divider"></div>

          <button class="editor-toolbar__zoom-btn" aria-label="Zoom">
            <svg viewBox="0 0 16 16" fill="none">
              <rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/>
              <path d="M5 8h6M8 5v6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <div class="editor-toolbar__right">
          <div class="editor-toolbar__tools">
            <svg viewBox="0 0 16 16" fill="none">
              <path d="M2 4h12M2 8h8M2 12h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <span>Tools</span>
          </div>
          <button class="editor-toolbar__publish-btn">Publish</button>
        </div>
      </div>

      <!-- Canvas: auto-scrolling page preview -->
      <div class="editor-canvas" #canvasEl>
        <div
          class="editor-canvas__page"
          (click)="togglePause()"
          [class.editor-canvas__page--paused]="isPaused()"
          title="{{ isPaused() ? 'Click to resume' : 'Click to pause' }}"
        >
          <img
            #canvasImg
            src="assets/Ecommerce Showcase/Storefront/desktop.jpeg"
            alt="Storefront preview"
            class="editor-canvas__img"
          />

          <!-- Pause indicator overlay -->
          @if (isPaused()) {
            <div class="editor-canvas__pause-badge">
              <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
                <rect x="4" y="3" width="4" height="14" rx="1.5"/>
                <rect x="12" y="3" width="4" height="14" rx="1.5"/>
              </svg>
              Paused
            </div>
          }
        </div>
      </div>

    </div>
  </div>

</section>
