<section class="builder-help-deck">
    <div class="builder-help-deck__inner">
        <p class="builder-help-deck__title">Blog Website FAQ</p>
        <div class="builder-help-deck__list">
            @for (item of faqs(); track item.question; let i = $index) {
                <article class="faq-item" [class.faq-item--open]="isOpen(i)">
                    <button
                        type="button"
                        class="faq-item__trigger"
                        (click)="toggleItem(i)"
                        [attr.aria-expanded]="isOpen(i)"
                    >
                        <span class="faq-item__question">{{ item.question }}</span>
                        <svg
                            class="faq-item__icon"
                            viewBox="0 0 24 24"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                            aria-hidden="true"
                        >
                            <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <line class="faq-item__icon-v" x1="12" y1="4" x2="12" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <div class="faq-item__content" [class.faq-item__content--open]="isOpen(i)">
                        <div class="faq-item__content-inner">
                            <p>{{ item.answer }}</p>
                        </div>
                    </div>
                </article>
            }
        </div>
    </div>
</section>
