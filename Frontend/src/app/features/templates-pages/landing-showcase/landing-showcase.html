<main class="landing-showcase">

  <div class="landing-showcase__shell">

        <h2 class="landing-showcase__sidebar-title">Quick jump</h2>

        <nav class="landing-showcase__sidebar-nav">

          <a class="landing-showcase__sidebar-link" href="#overview">Overview</a>
          <a class="landing-showcase__sidebar-link" href="#templates">Templates</a>

      <section class="landing-showcase__section">

      <section class="landing-showcase__section">

      <section id="cta" class="landing-showcase__section">

  <app-footer />
