<section class="recent-activity">
  <div class="recent-activity__header">
    <div class="recent-activity__heading">
      <div class="recent-activity__title-row">
        <div class="recent-activity__title-icon">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8" />
            <path
              d="M12 7V12L15 14.5"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>

        <h2 class="recent-activity__title">Recent Activity</h2>
      </div>
    </div>
  </div>

  <div class="recent-activity__list">
    @for (activity of activities(); track trackByIndex($index); let first = $first; let last = $last) {
      <article class="activity-item">
        <div class="activity-item__left">
          <div
            class="activity-item__icon"
            [class.activity-item__icon--edited]="activity.type === 'edited'"
            [class.activity-item__icon--published]="activity.type === 'published'"
            [class.activity-item__icon--created]="activity.type === 'created'"
          >
            @if (activity.type === 'edited') {
              <svg
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <path
                  d="M4 20H8L18 10C18.5304 9.46957 18.8284 8.75022 18.8284 8C18.8284 7.24978 18.5304 6.53043 18 6C17.4696 5.46957 16.7502 5.17157 16 5.17157C15.2498 5.17157 14.5304 5.46957 14 6L4 16V20Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M13 7L17 11"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            }

            @if (activity.type === 'published') {
              <svg
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8" />
                <path
                  d="M8.5 12L10.8 14.3L15.5 9.5"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            }

            @if (activity.type === 'created') {
              <svg
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <path
                  d="M12 5V19"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
                <path
                  d="M5 12H19"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            }
          </div>

          @if (!last) {
            <span class="activity-item__line" aria-hidden="true"></span>
          }
        </div>

        <div class="activity-item__content">
          <h3 class="activity-item__title">{{ activity.title }}</h3>
          <p class="activity-item__time">{{ activity.time }}</p>
        </div>
      </article>
    }
  </div>
</section>
