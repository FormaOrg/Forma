<section class="recent-projects">
  <header class="recent-projects__header">
    <div class="recent-projects__intro">
      <h2 class="recent-projects__title">Recent projects</h2>
      <p class="recent-projects__subtitle">Last updated workspaces across your account.</p>
    </div>
    <a routerLink="/app/projects" class="recent-projects__link">View all</a>
  </header>

  <div class="recent-projects__list">
    @for (project of projects(); track trackByName($index, project)) {
      <a class="project-row" [routerLink]="project.route">
        <div class="project-row__body">
          <div class="project-row__top">
            <h3 class="project-row__name">{{ project.name }}</h3>
            <span
              class="project-row__pill"
              [class.project-row__pill--published]="project.status === 'published'"
              [class.project-row__pill--draft]="project.status === 'draft'"
            >
              {{ project.status === 'published' ? 'Live' : 'Draft' }}
            </span>
          </div>
          <div class="project-row__meta">
            <span class="project-row__domain">
              <svg class="project-row__domain-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M14 5H19V10M10 14L19 5M19 14V18C19 18.5523 18.5523 19 18 19H6C5.44772 19 5 18.5523 5 18V6C5 5.44772 5.44772 5 6 5H10"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              {{ project.domain }}
            </span>
            <span class="project-row__dot" aria-hidden="true"></span>
            <span class="project-row__updated">{{ project.updatedAt }}</span>
          </div>
        </div>
        <span class="project-row__chev" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M9 6L15 12L9 18"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </span>
      </a>
    }
  </div>
</section>
