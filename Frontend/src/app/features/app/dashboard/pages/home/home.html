<section class="home-page">
  <app-greeting-section class="home-page__hero" [userName]="'Ismail'"></app-greeting-section>

  <section class="home-page__stats" aria-label="Workspace metrics">
    <app-data-card
      class="home-page__panel"
      [icon]="globeIcon"
      [title]="'Sites created'"
      [value]="'12'"
      [description]="'+2 this month'"
    ></app-data-card>

    <app-data-card
      class="home-page__panel"
      [icon]="checkIcon"
      [title]="'Published Sites'"
      [value]="'8'"
      [description]="'66% of total'"
    ></app-data-card>

    <app-data-card
      class="home-page__panel"
      [icon]="draftIcon"
      [title]="'Draft Sites'"
      [value]="'4'"
      [description]="'Ready to publish'"
    ></app-data-card>

    <app-data-card
      class="home-page__panel"
      [icon]="clockIcon"
      [title]="'Last Activity'"
      [value]="'2 hours ago'"
      [description]="'Portfolio site edited'"
    ></app-data-card>
  </section>

  <section class="home-page__workspace">
    <div class="home-page__main-column">
      <app-recent-projects class="home-page__panel home-page__panel--featured"></app-recent-projects>
      <app-recent-templates class="home-page__panel"></app-recent-templates>
      <app-setup-progress class="home-page__panel"></app-setup-progress>
    </div>

    <aside class="home-page__rail">
      <app-recent-activity class="home-page__panel"></app-recent-activity>

      <section class="home-quick-actions home-page__panel" aria-labelledby="home-quick-actions-title">
        <div class="home-quick-actions__header">
          <div>
            <p class="home-quick-actions__eyebrow">Quick actions</p>
            <h2 id="home-quick-actions-title" class="home-quick-actions__title">Pick up where you left off</h2>
          </div>
        </div>

        <div class="home-quick-actions__list">
          <a class="home-quick-actions__item" routerLink="/app/projects">
            <span class="home-quick-actions__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 5V19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                <path d="M5 12H19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
              </svg>
            </span>
            <span class="home-quick-actions__body">
              <span class="home-quick-actions__label">Create a project</span>
              <span class="home-quick-actions__hint">Start from scratch and keep building.</span>
            </span>
          </a>

          <a class="home-quick-actions__item" routerLink="/app/templates">
            <span class="home-quick-actions__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 4L20 8.5L12 13L4 8.5L12 4Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                <path d="M4 12.5L12 17L20 12.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </span>
            <span class="home-quick-actions__body">
              <span class="home-quick-actions__label">Browse templates</span>
              <span class="home-quick-actions__hint">Reuse a proven layout and move faster.</span>
            </span>
          </a>

          <a class="home-quick-actions__item" routerLink="/app/settings/profile">
            <span class="home-quick-actions__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" stroke="currentColor" stroke-width="1.8" />
                <path d="M4 21C4 17.6863 7.58172 15 12 15C16.4183 15 20 17.6863 20 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              </svg>
            </span>
            <span class="home-quick-actions__body">
              <span class="home-quick-actions__label">Update profile</span>
              <span class="home-quick-actions__hint">Complete your setup and keep your workspace ready.</span>
            </span>
          </a>
        </div>
      </section>

      <app-account-snapshot class="home-page__panel"></app-account-snapshot>
    </aside>
  </section>
</section>
