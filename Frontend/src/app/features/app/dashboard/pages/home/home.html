<section class="home-page">
  <app-greeting-section [userName]="'Ismail'"></app-greeting-section>

  <nav class="home-page__toolbar" aria-label="Shortcuts">
    @for (link of quickLinks(); track link.path) {
      <a [routerLink]="link.path" class="home-page__toolbar-link">{{ link.label }}</a>
    }
  </nav>

  <div class="home-page__stats">
    @for (card of statCards(); track card.id) {
      <app-data-card
        [icon]="iconFor(card.iconKey)"
        [title]="card.title"
        [value]="card.value"
        [description]="card.description"
      ></app-data-card>
    }
  </div>

  <div class="home-page__grid">
    <div class="home-page__main">
      <app-recent-projects></app-recent-projects>
      <app-recent-templates></app-recent-templates>
    </div>
    <aside class="home-page__aside" aria-label="Overview">
      <app-recent-activity />
      <app-account-snapshot></app-account-snapshot>
      <app-setup-progress></app-setup-progress>
    </aside>
  </div>
</section>
