<section class="greeting">
  <div class="greeting__main">
    <div class="greeting__text">
      <p class="greeting__eyebrow">Good to see you</p>
      <h1 class="greeting__title">
        Welcome back, <span class="greeting__name">{{ userName }}</span>
      </h1>
      <p class="greeting__subtitle">Pick up where you left off or start something new.</p>
    </div>

    <div class="greeting__actions">
      <button type="button" class="greeting__btn greeting__btn--secondary">
        <svg class="greeting__btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M10 7V5.5C10 4.67157 10.6716 4 11.5 4H18.5C19.3284 4 20 4.67157 20 5.5V18.5C20 19.3284 19.3284 20 18.5 20H11.5C10.6716 20 10 19.3284 10 18.5V17"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path d="M4 12H14" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
          <path d="M11 9L14 12L11 15" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>Import site</span>
      </button>

      <button type="button" class="greeting__btn greeting__btn--primary">
        <svg class="greeting__btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 5V19" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
          <path d="M5 12H19" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
        </svg>
        <span>New site</span>
      </button>
    </div>
  </div>
</section>
