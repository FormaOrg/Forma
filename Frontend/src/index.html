    <script>
      (function () {
        var pathname = window.location.pathname || '/';
        var useAppTheme = pathname === '/app' || pathname.indexOf('/app/') === 0;
        var resolvedTheme = 'light';

        if (useAppTheme) {
          var savedTheme = localStorage.getItem('forma_theme_preference');
          if (savedTheme === 'dark') {
            resolvedTheme = 'dark';
          } else if (savedTheme === 'system') {
            resolvedTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
        }

        document.documentElement.dataset['theme'] = resolvedTheme;
        document.documentElement.style.colorScheme = resolvedTheme;
      })();
    </script>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f6f4ef;
      }

      html[data-theme='dark'],
      html[data-theme='dark'] body {
        background: #0f1218;
      }

      body {
        font-family: 'Poppins', sans-serif;
      }

      html:not(.forma-app-ready) app-root,
      html:not(.forma-styles-ready) app-root {
        visibility: hidden;
      }

      html.forma-app-ready.forma-styles-ready:not(.forma-route-loading) #forma-bootstrap-fallback {
        display: none;
        pointer-events: none;
      }

      #forma-bootstrap-fallback {
        position: fixed;
        inset: 0;
        z-index: 999999;
      }

      #forma-bootstrap-fallback .bootstrap-loader {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        overflow: hidden;
        isolation: isolate;
        color: #111111;
        background-color: #f6f4ef;

          radial-gradient(circle at 82% 18%, rgba(214, 226, 255, 0.3), transparent 22%),

          linear-gradient(135deg, #faf7f1 0%, #f2efe9 52%, #f8f5f0 100%);

      #forma-bootstrap-fallback .bootstrap-loader__stage {
        position: relative;
        display: grid;
        place-items: center;
        min-width: 460px;
        min-height: 320px;
      }

      #forma-bootstrap-fallback .bootstrap-loader__dark-visuals {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      #forma-bootstrap-fallback .bootstrap-loader__dark-visuals {
        opacity: 0;
        transition: opacity 0.45s ease;
      }

      #forma-bootstrap-fallback .bootstrap-loader--dark .bootstrap-loader__dark-visuals {
        opacity: 1;
      }

      #forma-bootstrap-fallback .bootstrap-loader--dark .bootstrap-loader__light-visuals {
        opacity: 0;
      }

      #forma-bootstrap-fallback .bootstrap-loader__light-ring,
      #forma-bootstrap-fallback .bootstrap-loader__light-sheen,
      #forma-bootstrap-fallback .bootstrap-loader__light-core {
        position: absolute;
        border-radius: 999px;
        pointer-events: none;
      }

    <script>
      (function () {
        function markWindowLoaded() {
          window.setTimeout(function () {
            requestAnimationFrame(function () {
              requestAnimationFrame(function () {
                document.documentElement.classList.add('forma-window-loaded');
              });
            });
          }, 150);
        }

        if (document.readyState === 'complete') {
          markWindowLoaded();
          return;
        }

        window.addEventListener('load', markWindowLoaded, { once: true });
      })();
    </script>
    <script>
      (function () {
        function isLocalStylesheet(link) {
          var href = link.getAttribute('href') || '';
          if (!href) return false;
          return !href.startsWith('http://') && !href.startsWith('https://');
        }

        function markStylesReady() {
          document.documentElement.classList.add('forma-styles-ready');
        }

        function waitForLocalStylesheets() {
          var links = Array.prototype.slice.call(
            document.querySelectorAll('link[rel="stylesheet"]')
          ).filter(isLocalStylesheet);

          if (!links.length) {
            markStylesReady();
            return;
          }

          var pending = links.length;

          function resolveOne() {
            pending -= 1;
            if (pending <= 0) {
              markStylesReady();
            }
          }

          links.forEach(function (link) {
            if (link.sheet) {
              resolveOne();
              return;
            }

            link.addEventListener('load', resolveOne, { once: true });
            link.addEventListener('error', resolveOne, { once: true });
          });
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', waitForLocalStylesheets, { once: true });
        } else {
          waitForLocalStylesheets();
        }
      })();
    </script>
    <script>
      (function () {
        const host = (window.location && window.location.hostname || '').toLowerCase();
        const isLocal = host === 'localhost' || host === '127.0.0.1';

        window.__FORMA_RUNTIME_CONFIG__ = {
          apiUrl: isLocal ? 'http://localhost:8081/api' : 'https://forma-production-c40b.up.railway.app/api',
          wsBaseUrl: isLocal ? 'ws://localhost:8081/ws' : 'wss://forma-production-c40b.up.railway.app/ws'
        };
      })();
    </script>
    <script>
      (function () {
        const url = new URL(window.location.href);
        const state = url.searchParams.get('state');
        const code = url.searchParams.get('code');
        const error = url.searchParams.get('error');

        if (!window.opener || !state || !state.startsWith('google-auth:') || (!code && !error)) {
          return;
        }

        window.__FORMA_SKIP_BOOTSTRAP__ = true;

        const apiUrl = (window.__FORMA_RUNTIME_CONFIG__ && window.__FORMA_RUNTIME_CONFIG__.apiUrl)
          ? window.__FORMA_RUNTIME_CONFIG__.apiUrl
          : 'http://localhost:8081/api';
        const resultKey = 'forma_google_auth_result';
        const pendingAuthKey = 'forma_google_auth_pending_response';
        const loginVerificationKey = 'forma_login_verification';
        const messageType = 'forma-google-auth-result';
        const channelName = 'forma-google-auth';

        const rememberMe = state.split(':')[2] === '1';
        const targetRoute = decodeURIComponent(state.split(':')[3] || '/app/home');
        const redirectUri = url.pathname === '/' ? url.origin : (url.origin + url.pathname.replace(/\/$/, ''));

        const publish = function (payload) {
          localStorage.setItem(resultKey, JSON.stringify(payload));

          if (payload.success && payload.response) {
            if (payload.response.requiresLoginVerification && payload.response.loginVerificationToken) {
              localStorage.setItem(loginVerificationKey, JSON.stringify({
                token: payload.response.loginVerificationToken,
                email: payload.response.user.email,
                message: payload.response.message,
                rememberMe: rememberMe,
                returnUrl: targetRoute
              }));
            } else {
              localStorage.setItem(pendingAuthKey, JSON.stringify({
                response: payload.response,
                rememberMe: rememberMe
              }));
            }
          }

          try {
            if (typeof BroadcastChannel !== 'undefined') {
              const channel = new BroadcastChannel(channelName);
              channel.postMessage(payload);
              channel.close();
            }
          } catch (_) {}

          try {
            window.opener.postMessage(
              { type: messageType, payload: payload },
              window.location.origin
            );
          } catch (_) {}

          const nextUrl = payload.success && payload.response
            ? (payload.response.requiresLoginVerification && payload.response.loginVerificationToken
              ? '/login-verification?returnUrl=' + encodeURIComponent(targetRoute)
              : targetRoute)
            : '/login';

          try {
            window.opener.location.assign(nextUrl);
          } catch (_) {}

          window.setTimeout(function () {
            window.close();
          }, 100);
        };

        const fail = function (message) {
          publish({
            state: state,
            success: false,
            message: message
          });
        };

        if (error) {
          fail('Google sign-in failed. Please try again.');
          return;
        }

        document.addEventListener('DOMContentLoaded', function () {
          document.body.innerHTML = '<div style="font-family:Poppins,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#0f172a">Finishing Google sign-in...</div>';
        });

        fetch(apiUrl + '/auth/google/code', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            code: code,
            redirectUri: redirectUri,
            rememberMe: rememberMe
          })
        })
          .then(function (response) {
            return response.json().catch(function () {
              return {};
            }).then(function (data) {
              if (!response.ok) {
                throw new Error(data.message || 'Google sign-in failed. Please try again.');
              }

              publish({
                state: state,
                success: true,
                response: data
              });
            });
          })
          .catch(function (err) {
            fail(err && err.message ? err.message : 'Google sign-in failed. Please try again.');
          });
      })();
    </script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var fallback = document.getElementById('forma-bootstrap-fallback');
        if (!fallback) return;
        var loader = fallback.querySelector('.bootstrap-loader');
        var logo = fallback.querySelector('.logo-link');
        var word = fallback.querySelector('.logo-word');
        var iconImages = fallback.querySelectorAll('.logo-icon img');
        var words = ['Build', 'Create', 'Design'];
        var index = 0;
        var isDark = document.documentElement.dataset.theme === 'dark';

        if (isDark && loader && logo) {
          loader.classList.add('bootstrap-loader--dark');
          logo.classList.add('bootstrap-loader__logo--dark');
        }

        if (iconImages.length === 4) {
          var sources = isDark
            ? ['assets/Logo/part1-white.svg', 'assets/Logo/part2-white.svg', 'assets/Logo/part3-white.svg', 'assets/Logo/dot-white.svg']
            : ['assets/Logo/part1.svg', 'assets/Logo/part2.svg', 'assets/Logo/part3.svg', 'assets/Logo/dot.svg'];

          iconImages.forEach(function (img, idx) {
            img.setAttribute('src', sources[idx]);
          });
        }

        function runCycle() {
          if (!logo || !word) return;
          word.textContent = words[index];
          logo.classList.add('animating');
          window.setTimeout(function () {
            logo.classList.remove('animating');
            window.setTimeout(function () {
              index = (index + 1) % words.length;
            }, 400);
          }, 3400);
        }

        window.setTimeout(function () {
          runCycle();
          window.setInterval(runCycle, 5200);
        }, 1200);
      });
    </script>
  </head>
  <body>
    <div id="forma-bootstrap-fallback" aria-hidden="true">
        <div class="bootstrap-loader">
          <div class="bootstrap-loader__stage">
            <div class="bootstrap-loader__light-visuals" aria-hidden="true">
              <div class="bootstrap-loader__light-bloom"></div>
              <div class="bootstrap-loader__light-ring"></div>
              <div class="bootstrap-loader__light-sheen"></div>
              <div class="bootstrap-loader__light-core"></div>
            </div>

            <div class="bootstrap-loader__dark-visuals" aria-hidden="true">
              <div class="bootstrap-loader__orb bootstrap-loader__orb--outer"></div>
              <div class="bootstrap-loader__orb bootstrap-loader__orb--mid"></div>
              <div class="bootstrap-loader__orb bootstrap-loader__orb--inner"></div>
            </div>

            <div class="bootstrap-loader__logo logo-link">
            <span class="logo-word-container">
              <span class="logo-word">Build</span>
            </span>

            <div class="logo-icon" aria-hidden="true">
              <img src="assets/Logo/part1.svg" alt="" />
              <img src="assets/Logo/part2.svg" alt="" />
              <img src="assets/Logo/part3.svg" alt="" />
              <img src="assets/Logo/dot.svg" alt="" />
            </div>

            <span class="logo-name">Forma</span>
          </div>
        </div>
      </div>
    </div>
    <app-root></app-root>
  </body>
</html>
