#?? Server ????????????????????????????????????????????????
server.port=${PORT:8081}
spring.application.name=service-utilisateurs
spring.config.import=optional:file:.env[.properties]

#?? Database ??????????????????????????????????????????????
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#?? JPA ???????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
#?? Mail ??????????????????????????????????????????????????
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

#?? File upload ???????????????????????????????????????????
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#?? JWT ???????????????????????????????????????????????????
application.jwt.secret=${JWT_SECRET:Zm9ybWEtc3VwZXItc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtMjAyNQ==}
application.jwt.expiration=86400000
application.jwt.refresh-expiration=86400000
application.jwt.remember-expiration=2592000000
application.jwt.remember-refresh-expiration=2592000000

#?? App ???????????????????????????????????????????????????
application.frontend-url=${FRONTEND_URL:http://localhost:4200}
application.allowed-origins=${APP_ALLOWED_ORIGINS:}
application.upload.dir=${UPLOAD_DIR:uploads}
application.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
application.cloudinary.api-key=${CLOUDINARY_API_KEY}
application.cloudinary.api-secret=${CLOUDINARY_API_SECRET}
application.google.client-id=${GOOGLE_CLIENT_ID:}
application.google.link-client-id=${GOOGLE_LINK_CLIENT_ID:}
application.google.link-client-secret=${GOOGLE_LINK_CLIENT_SECRET:}
application.google.link-redirect-uri=${GOOGLE_LINK_REDIRECT_URI:}

spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000
