services:
  service-projets:
    build: .
    container_name: forma_projects
    env_file:
      - ../service-utilisateurs/.env
    ports:
      - "8082:8082"
    environment:
      JWT_SECRET: ${JWT_SECRET:-Zm9ybWEtc3VwZXItc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtMjAyNQ==}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
    volumes:
      - uploads_data:/app/uploads

volumes:
  uploads_data:
